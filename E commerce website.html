<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="E commerce website.css">
</head>
<body>
<!-- HEADER -->
  <header class="header">

    <h1>My Store</h1>

    <input
      type="text"
      id="searchInput"
      placeholder="Search products..."
    >

    <div class="cart-box">
      🛒 Cart:
      <span id="cart-count">0</span>
    </div>

  </header>

  <!-- PRODUCTS -->
  <section
    class="products"
    id="product-container"
  ></section>

  <!-- CART -->
  <section class="cart">

    <h2>Shopping Cart</h2>

    <div id="cart-items"></div>

    <h3>
      Total: ₹
      <span id="total">0</span>
    </h3>

  </section>
</body>
<script src="E commerce website.js"></script>
</html>
